<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Duiker Properties</title>
    <meta name="description" content="This page is coming soon. Explore Calgary real estate with Duiker Properties.">
    
    <!-- Header CSS -->
    <link rel="stylesheet" href="https://kyleduiker.github.io/duikerproperties-homepage/assets/css/header.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-color: #EA002A;
            --dark-gray: #333;
            --light-gray: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--dark-gray);
            line-height: 1.6;
            background: #000;
        }

        /* Coming Soon Section */
        .coming-soon-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1920') center/cover fixed;
            position: relative;
        }

        .coming-soon-content {
            max-width: 800px;
            color: white;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .coming-soon-icon {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(234, 0, 42, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(234, 0, 42, 0);
            }
        }

        .coming-soon-title {
            font-family: 'Georgia', serif;
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .coming-soon-subtitle {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            opacity: 0.9;
            font-style: italic;
        }

        .coming-soon-text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 3rem;
            opacity: 0.85;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-home {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(234, 0, 42, 0.3);
        }

        .btn-home:hover {
            background: #c80020;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(234, 0, 42, 0.5);
        }

        .social-links {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .social-link {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.8;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .social-link:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .coming-soon-title {
                font-size: 2.5rem;
            }

            .coming-soon-subtitle {
                font-size: 1.2rem;
            }

            .coming-soon-text {
                font-size: 1rem;
            }

            .btn-home {
                padding: 1rem 2rem;
                font-size: 0.9rem;
            }

            .social-links {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .coming-soon-title {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .coming-soon-icon {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Coming Soon Section -->
    <section class="coming-soon-container">
        <div class="coming-soon-content">
            <div class="coming-soon-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>

            <h1 class="coming-soon-title">Coming Soon</h1>
            <p class="coming-soon-subtitle">We're Working on Something Special</p>
            <p class="coming-soon-text">
                This page is currently under construction. We're creating an exceptional experience 
                for you. In the meantime, explore our featured properties and Calgary communities.
            </p>

            <a href="https://duikerproperties.com" class="btn-home">Return to Home</a>

            <div class="social-links">
                <a href="https://duikerproperties.com/contact" class="social-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    Contact Us
                </a>
                <a href="tel:4037973384" class="social-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    (403) 797-3384
                </a>
            </div>
        </div>
    </section>

    <!-- Header JavaScript -->
    <script src="https://kyleduiker.github.io/duikerproperties-homepage/assets/js/header.js"></script>
</body>
</html>
